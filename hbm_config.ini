[connectivity]

# ========================================================================
# 优化策略：将元数据端口分为 HBM 和 DDR 两类，避免超过 hmss_0 的 33 端口限制
# ========================================================================

# 1. 矩阵输入 - 高带宽，HBM 直连（8个端口）
sp=SparseLUKernel_1.matrix_data_in_0:HBM[0]
sp=SparseLUKernel_1.matrix_data_in_1:HBM[1]
sp=SparseLUKernel_1.matrix_data_in_2:HBM[2]
sp=SparseLUKernel_1.matrix_data_in_3:HBM[3]
sp=SparseLUKernel_1.matrix_data_in_4:HBM[4]
sp=SparseLUKernel_1.matrix_data_in_5:HBM[5]
sp=SparseLUKernel_1.matrix_data_in_6:HBM[6]
sp=SparseLUKernel_1.matrix_data_in_7:HBM[7]

# 2. LU 因子输出 - 高带宽，HBM 直连（8个端口）
sp=SparseLUKernel_1.lu_factor_out_0:HBM[8]
sp=SparseLUKernel_1.lu_factor_out_1:HBM[9]
sp=SparseLUKernel_1.lu_factor_out_2:HBM[10]
sp=SparseLUKernel_1.lu_factor_out_3:HBM[11]
sp=SparseLUKernel_1.lu_factor_out_4:HBM[12]
sp=SparseLUKernel_1.lu_factor_out_5:HBM[13]
sp=SparseLUKernel_1.lu_factor_out_6:HBM[14]
sp=SparseLUKernel_1.lu_factor_out_7:HBM[15]

# 3. LU 因子读取 - 中等带宽，HBM 直连（复用写端口通道，8个端口）
sp=SparseLUKernel_1.lu_factor_fetch_0:HBM[8]
sp=SparseLUKernel_1.lu_factor_fetch_1:HBM[9]
sp=SparseLUKernel_1.lu_factor_fetch_2:HBM[10]
sp=SparseLUKernel_1.lu_factor_fetch_3:HBM[11]
sp=SparseLUKernel_1.lu_factor_fetch_4:HBM[12]
sp=SparseLUKernel_1.lu_factor_fetch_5:HBM[13]
sp=SparseLUKernel_1.lu_factor_fetch_6:HBM[14]
sp=SparseLUKernel_1.lu_factor_fetch_7:HBM[15]

# 4. 运行时频繁访问的元数据 - HBM（2个端口）
sp=SparseLUKernel_1.lu_factor_col_hbm_offset_fetch_mmap:HBM[16]
sp=SparseLUKernel_1.lu_factor_col_hbm_count_fetch_mmap:HBM[17]

# 5. 启动时一次性加载的元数据 - DDR（8个端口，低延迟要求）
# 这些数据在启动时加载到片上 BRAM 后就不再访问，使用 DDR 不影响性能
sp=SparseLUKernel_1.global_params_mmap:DDR[0]
sp=SparseLUKernel_1.level_ptr_mmap:DDR[0]
sp=SparseLUKernel_1.level_idx_mmap:DDR[0]
sp=SparseLUKernel_1.col_hbm_word_offset_mmap:DDR[0]
sp=SparseLUKernel_1.col_hbm_word_count_mmap:DDR[0]
sp=SparseLUKernel_1.lu_factor_col_hbm_offset_mmap:DDR[0]
sp=SparseLUKernel_1.dep_list_offsets_mmap:DDR[0]
sp=SparseLUKernel_1.flat_dep_list_mmap:DDR[0]

# ========================================================================
# 端口统计：
# - HBM 连接：8 (matrix_in) + 8 (lu_out) + 8 (lu_fetch) + 2 (metadata) = 26 个 ✅
# - DDR 连接：8 个元数据端口共享 DDR[0]
# - 总计 HBM 连接 < 33 限制，满足 hmss_0 要求
# ========================================================================